server {
    listen 80;
    listen [::]:80;
    server_name gift.remuse.top;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gift.remuse.top;

    ssl_certificate /etc/letsencrypt/live/gift.remuse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gift.remuse.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/remuse-gift/current;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /nfc-showcase/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.svg {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
